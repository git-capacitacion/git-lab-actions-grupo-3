name: Workflow Laboratorios

on:
  push:
    branches: [main, feature/**]
  pull_request:
    branches: [main]

jobs: 
  test: 
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [16, 18, 20]
      fail-fast: false
      max-parallel: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test